name: Maven Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 18
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '18'

      - name: Build with Maven
        working-directory: src
        run: mvn -B -P jdk18 clean package

      - name: List build output (debug)
        run: ls -R src
        # this helps confirm src/target actually exists

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: src/target
